{{- /*
  cert-manager-issuer.yaml — EEBUS TLS 1.3 mTLS certificate provisioning
  Creates a ClusterIssuer (self-signed or ACME) and a managed Certificate for
  EEBUS SPINE/SHIP mutual TLS authentication.

  Requires cert-manager ≥ v1.14 installed in the cluster.
  Enable via: helm install ... --set certManager.enabled=true
*/ -}}
{{- if .Values.certManager.enabled }}
---
{{- if .Values.certManager.acme.enabled }}
# ── ACME ClusterIssuer (Let's Encrypt) ──────────────────────────────────────
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.certManager.issuerName | quote }}
  labels:
    {{- include "nexus-hems.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/issue-temporary-certificate: "true"
spec:
  acme:
    server: {{ .Values.certManager.acme.server | quote }}
    email: {{ required "certManager.acme.email is required when ACME is enabled" .Values.certManager.acme.email | quote }}
    privateKeySecretRef:
      name: {{ .Values.certManager.acme.privateKeySecretName | quote }}
    solvers:
      - http01:
          ingress:
            class: nginx
{{- else if .Values.certManager.selfSigned.enabled }}
# ── Self-Signed ClusterIssuer (development / local EEBUS) ───────────────────
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.certManager.issuerName | quote }}
  labels:
    {{- include "nexus-hems.labels" . | nindent 4 }}
spec:
  selfSigned: {}
{{- end }}
---
# ── Certificate (EEBUS device TLS credential) ───────────────────────────────
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "nexus-hems.fullname" . }}-eebus-tls
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "nexus-hems.labels" . | nindent 4 }}
    app.kubernetes.io/component: eebus-tls
  annotations:
    # Allow EEBUS adapter pods to reload the secret on rotation without restart
    reloader.stakater.com/match: "true"
spec:
  secretName: {{ .Values.certManager.certificateSecretName | quote }}
  issuerRef:
    name: {{ .Values.certManager.issuerName | quote }}
    kind: ClusterIssuer
    group: cert-manager.io
  commonName: {{ include "nexus-hems.fullname" . }}-eebus
  dnsNames:
    {{- range .Values.certManager.dnsNames }}
    - {{ . | quote }}
    {{- end }}
  usages:
    - digital signature
    - key encipherment
    # mTLS: both client and server auth per VDE-AR-E 2829-6 §6.2
    - client auth
    - server auth
  duration: {{ .Values.certManager.duration | quote }}
  renewBefore: {{ .Values.certManager.renewBefore | quote }}
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
{{- end }}
