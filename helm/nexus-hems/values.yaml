# ─── Image ───────────────────────────────────────────────────────────
image:
  trustedRegistries:
    - ghcr.io/qnbs/
  frontend:
    repository: ghcr.io/qnbs/nexus-hems-dash
    # Overridden by --set image.frontend.tag during CI/CD; defaults to Chart appVersion
    tag: ''
    # Optional immutable pin: if set, deployment uses repository@digest instead of tag
    digest: ''
    pullPolicy: IfNotPresent
  server:
    repository: ghcr.io/qnbs/nexus-hems-server
    # Overridden by --set image.server.tag during CI/CD; defaults to Chart appVersion
    tag: ''
    # Optional immutable pin: if set, deployment uses repository@digest instead of tag
    digest: ''
    pullPolicy: IfNotPresent

# ─── Deployment Strategy & Rollback ─────────────────────────────────
deployment:
  revisionHistoryLimit: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

# ─── Replicas ────────────────────────────────────────────────────────
replicaCount:
  frontend: 2
  server: 2

# ─── Service ─────────────────────────────────────────────────────────
service:
  frontend:
    type: ClusterIP
    port: 8080
  server:
    type: ClusterIP
    port: 3000

# ─── Ingress ─────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
    nginx.ingress.kubernetes.io/proxy-read-timeout: '60'
    nginx.ingress.kubernetes.io/proxy-send-timeout: '60'
    nginx.ingress.kubernetes.io/websocket-services: nexus-hems-server
  host: hems.example.com
  tls:
    secretName: nexus-hems-tls

# ─── Resources ───────────────────────────────────────────────────────
resources:
  frontend:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  server:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ─── HPA ─────────────────────────────────────────────────────────────
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 8
  targetCPUUtilization: 70
  targetMemoryUtilization: 80

# ─── Monitoring ──────────────────────────────────────────────────────
monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 15s
    scrapeTimeout: 10s
  prometheusRule:
    enabled: true
  grafanaDashboard:
    enabled: true

# ─── Security ────────────────────────────────────────────────────────
# Pod Security Standards (PSS) — enforced at namespace level via namespace.yaml template.
# Set podSecurity.createNamespace: true to enable PSS labels on the namespace.
# See: https://kubernetes.io/docs/concepts/security/pod-security-standards/
podSecurity:
  # Set true only when Helm has permission to create/manage the namespace
  createNamespace: false
  enforce: restricted
  enforceVersion: latest
  audit: restricted
  auditVersion: latest
  warn: restricted
  warnVersion: latest

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# ─── Environment ─────────────────────────────────────────────────────
env:
  NODE_ENV: production
  PORT: '3000'

# ─── Secrets (reference existing K8s secret) ─────────────────────────
existingSecret: ''
# If set, expects keys: JWT_SECRET, SENTRY_DSN

# ─── Network Policy ─────────────────────────────────────────────────
networkPolicy:
  enabled: true

# ─── PDB ─────────────────────────────────────────────────────────────
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# ─── cert-manager (EEBUS TLS 1.3 mTLS) ──────────────────────────────
certManager:
  # Set to true to create a ClusterIssuer + wildcard certificate for EEBUS mTLS
  enabled: false
  # cert-manager ClusterIssuer name to reference for TLS certificate requests
  issuerName: nexus-hems-eebus-issuer
  # ACME staging/prod server URL (used when acme.enabled=true)
  acme:
    enabled: false
    email: ''
    server: https://acme-v02.api.letsencrypt.org/directory
    # Name of the Kubernetes Secret that stores the ACME account private key
    privateKeySecretName: nexus-hems-acme-account-key
  # Self-signed issuer for local/development EEBUS mTLS (used when acme.enabled=false)
  selfSigned:
    enabled: true
  # TLS Secret that cert-manager will manage (must match EEBUS TLS secret refs)
  certificateSecretName: nexus-hems-eebus-tls
  # DNS names included in the EEBUS device certificate
  dnsNames:
    - nexus-hems.local
  # Certificate duration and renewal window
  duration: 8760h    # 1 year
  renewBefore: 720h  # 30 days
