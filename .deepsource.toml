# DeepSource configuration for Nexus-HEMS-Dash
#
# Purpose:
#   Deterministic static analysis, secrets detection, Docker analysis, and
#   coverage diffing for the pnpm + Turborepo monorepo.
#
# Rollout mode:
#   Advisory-first. DeepSource posts inline PR comments and a report card but
#   is NOT a required merge gate until the initial tuning period (2–4 weeks)
#   and the existing HIGH-severity dependency advisories are remediated.
#
# Safety guardrails:
#   - Autofix is NOT enabled in this file; it must be configured from the
#     DeepSource dashboard and restricted to style/unused-import categories.
#   - Control-logic paths (adapters, auth, security middleware, command safety,
#     energy controllers) must never receive auto-committed fixes.
#
# Docs:
#   - docs/runbooks/deepsource-integration.md
#   - docs/PR-FEEDBACK-PLAYBOOK.md

version = 1

exclude_patterns = [
  "node_modules/**",
  "dist/**",
  "build/**",
  ".turbo/**",
  "**/*.d.ts",
  "**/coverage/**",
  "docs/**",
  "**/*.test.ts",
  "**/*.test.tsx",
  "**/*.spec.ts",
  "**/*.spec.tsx",
  "apps/web/src-tauri/**",
  "apps/web/storybook-static/**",
  "apps/web/playwright-report/**",
  "apps/web/test-results/**",
  "apps/web/public/**",
  "scripts/**",
  ".github/**",
]

test_patterns = [
  "apps/api/src/tests/**",
  "apps/web/src/tests/**",
  "apps/web/tests/e2e/**",
]

# JavaScript analyzer — DISABLED (2026-07-07).
#
# Why: on the free tier its default-branch check ("DeepSource: JavaScript")
# stays red because of rule-fit false positives that cannot be muted from repo
# files — dominated by JS-0067 ("no global scope", ~213×, fires on top-level
# statements in every ESM file by design). Team-wide muting via the GraphQL
# `suppressIssueForTeam` API is a paid feature ("Operation not allowed on this
# account type"), and repo-scoped muting is dashboard-only. The check is NOT a
# required merge gate, so this is pure red-X noise on every commit/PR.
#
# Coverage is preserved: Biome + ESLint own lint/style/hygiene (zero-warning
# gate in ci.yml), and CodeRabbit + CodeAnt provide AI PR review. The secrets,
# docker and test-coverage analyzers below stay enabled.
#
# Re-enable path: flip `enabled = true` once the dominant rule-fit rules
# (JS-0067, JS-0833) are muted repo-scoped from the DeepSource dashboard, or the
# team moves to a tier where API/team muting is available. See
# docs/runbooks/deepsource-integration.md.
[[analyzers]]
name = "javascript"
enabled = false

  [analyzers.meta]
  dialect = "typescript"
  plugins = ["react"]
  module_system = "es-modules"
  environment = ["nodejs", "browser", "vitest"]
  dependency_file_paths = [
    "apps/api/package.json",
    "apps/web/package.json",
    "packages/shared-types/package.json",
  ]
  cyclomatic_complexity_threshold = "critical"
  skip_doc_coverage = [
    "arrow-function-expression",
    "class-declaration",
    "class-expression",
    "function-declaration",
    "function-expression",
    "method-definition",
  ]

[[analyzers]]
name = "secrets"
enabled = true

[[analyzers]]
name = "docker"
enabled = true

[[analyzers]]
name = "test-coverage"
enabled = true

# No [[transformers]] block by design.
#   Formatting is owned exclusively by Biome (ADR-001, Biome-first toolchain).
#   DeepSource ships no `biome` transformer, and its JS transformers (`prettier`,
#   `standardjs`) are explicitly banned by this repo — registering one would fight
#   Biome and thrash `git blame`. DeepSource Autofix (dashboard-only, style/unused
#   categories) is the intended remediation path; see docs/runbooks/deepsource-integration.md.
