    <!-- Set theme from localStorage BEFORE any CSS/React loads to prevent blank screen -->
    <script nonce="__CSP_NONCE__">
      (() => {
        try {
          const stored = localStorage.getItem('nexus-hems-store');
          if (stored) {
            const parsed = JSON.parse(stored);
            const theme = parsed.state?.theme || 'ocean-dark';
            document.documentElement.setAttribute('data-theme', theme);
          } else {
            document.documentElement.setAttribute('data-theme', 'ocean-dark');
          }
        } catch {
          document.documentElement.setAttribute('data-theme', 'ocean-dark');
        }
      })();
    </script>
    <!-- GitHub Pages SPA redirect handler -->
    <script nonce="__CSP_NONCE__">
      (() => {
        const l = window.location;
        if (l.search[1] === '/') {
          const decoded = l.search
            .slice(1)
            .split('&')
            .map((s) => s.replace(/~and~/g, '&'))
            .join('&');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })();
    </script>

  <body class="app-body">
    <div id="root">
      <!-- Inline fallback prevents blank white screen while JS loads or during SW update -->
      <div id="app-loading" class="app-loading">
        <svg
          width="40"
          height="40"
          viewBox="0 0 24 24"
          fill="none"
          stroke="#22ff88"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
        </svg>
        <div class="app-loading-text">Loading Nexus HEMS…</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script nonce="__CSP_NONCE__">
      // Fallback: if app hasn't rendered after 5s (30s in E2E mode), show retry option
      // This also works as recovery when React crashes or SW serves stale cache
      var nexusRecoveryDelay = '%VITE_E2E_TESTING%' === 'true' ? 30000 : 5000;
      setTimeout(() => {
        var root = document.getElementById('root');
        if (!root) return;
        // Check if app rendered: look for theme-shell or visible content
        var appRendered =
          root.querySelector('.theme-shell') ||
          root.querySelector('[data-reactroot]') ||
          root.querySelector('header') ||
          root.querySelector('main') ||
          root.querySelector('nav');
        if (!appRendered) {
          // Clear root and show recovery UI
          root.innerHTML = '';
          const recovery = document.createElement('div');
          recovery.className = 'nexus-recovery';
          recovery.innerHTML =
            '<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#22ff88" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>' +
            '<div class="nexus-recovery-title">Nexus HEMS</div>' +
            '<div class="nexus-recovery-message">The app could not be loaded.</div>' +
            '<div class="nexus-recovery-detail">This can happen when the app updates. Clearing the cache usually fixes it.</div>';
          const btn = document.createElement('button');
          btn.textContent = 'Clear Cache & Reload';
          btn.className = 'nexus-recovery-button';
          btn.onclick = () => {
            btn.disabled = true;
            btn.textContent = 'Clearing…';
            if ('serviceWorker' in navigator) {
              navigator.serviceWorker.getRegistrations().then((regs) => {
                regs.forEach((r) => {
                  r.unregister();
                });
                caches.keys().then((names) => {
                  Promise.all(
                    names.map((n) => caches.delete(n)),
                  ).then(() => {
                    window.location.reload();
                  });
                });
              });
            } else {
              window.location.reload();
            }
          };
          recovery.appendChild(btn);
          root.appendChild(recovery);
        }
      }, nexusRecoveryDelay);
    </script>
