# ── Rate Limiting Zones ─────────────────────────────────────────
# 100 requests/min per IP (≈ 1.67 req/s), burst 20
limit_req_zone $binary_remote_addr zone=global:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_status 429;

# ── Connection Limits ───────────────────────────────────────────
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

server {
    listen 8080;
    server_name _;

    # ── Hide server version ─────────────────────────────────────
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    # ── Connection & Request Limits ─────────────────────────────
    limit_conn conn_limit 50;
    client_max_body_size 1m;
    client_body_timeout 10s;
    client_header_timeout 10s;
    keepalive_timeout 65s;
    send_timeout 10s;

    # ── Security Headers ────────────────────────────────────────
    # MED-03 / AUD-02: WS_ORIGINS and CSP_NONCE are injected at container start via
    # envsubst in Dockerfile (docker-entrypoint.sh extracts nonce from index.html).
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'nonce-${CSP_NONCE}'; style-src 'self' 'nonce-${CSP_NONCE}'; font-src 'self'; img-src 'self' data: blob: https:; connect-src 'self' https://api.tibber.com https://api.awattar.de https://api.awattar.at https://api.octopus.energy https://api.open-meteo.com https://generativelanguage.googleapis.com https://api.openai.com https://api.anthropic.com https://api.x.ai https://api.groq.com ${WS_ORIGINS}; worker-src 'self'; manifest-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none';" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "credentialless" always;

    # ── Gzip Compression ────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        image/svg+xml;

    # ── Brotli (if module available) ────────────────────────────
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # ── Static Asset Caching ────────────────────────────────────
    # Hashed assets → immutable long-term cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Service Worker → no cache (must always be fresh)
    location = /sw.js {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # Workbox files → short cache
    location /workbox- {
        expires 1d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Manifest → revalidate
    location = /manifest.json {
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
        try_files $uri =404;
    }

    # ── API reverse proxy (full-stack compose: service `api` on backend network) ──
    location /api/ {
        limit_req zone=api burst=10 nodelay;
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    location /metrics {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ── SPA Fallback ────────────────────────────────────────────
    location / {
        limit_req zone=global burst=20 nodelay;
        try_files $uri $uri/ /index.html;
    }

    # ── Deny dotfiles ───────────────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Deny access to sensitive files ──────────────────────────
    location ~* \.(env|git|gitignore|dockerignore|md|yml|yaml|toml|lock)$ {
        deny all;
        return 404;
    }
}
