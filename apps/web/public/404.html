<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Nexus HEMS Dashboard</title>
    <script>
      // GitHub Pages SPA redirect: converts path into query string
      // so index.html can restore it via history.replaceState
      var segmentCount = 1; // /Nexus-HEMS-Dash/ = 1 path segment
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? `:${l.port}` : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? `&${l.search.slice(1).replace(/&/g, '~and~')}` : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
