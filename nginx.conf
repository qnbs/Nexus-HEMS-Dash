# ── Rate Limiting Zones ─────────────────────────────────────────
# 100 requests/min per IP (≈ 1.67 req/s), burst 20
limit_req_zone $binary_remote_addr zone=global:10m rate=100r/m;
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_status 429;

server {
    listen 8080;
    server_name _;

    # ── Hide server version ─────────────────────────────────────
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    # ── Request Size Limits ─────────────────────────────────────
    client_max_body_size 1m;
    client_body_timeout 10s;
    client_header_timeout 10s;
    keepalive_timeout 65s;
    send_timeout 10s;

    # ── Security Headers ────────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://api.open-meteo.com https://api.tibber.com https://api.awattar.de https://api.awattar.at https://generativelanguage.googleapis.com https://api.openai.com https://api.anthropic.com https://api.x.ai https://api.groq.com wss://localhost:* wss://127.0.0.1:*; worker-src 'self'; manifest-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # ── Gzip Compression ────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        image/svg+xml;

    # ── Brotli (if module available) ────────────────────────────
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # ── Static Asset Caching ────────────────────────────────────
    # Hashed assets → immutable long-term cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Service Worker → no cache (must always be fresh)
    location = /sw.js {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # Workbox files → short cache
    location /workbox- {
        expires 1d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Manifest → revalidate
    location = /manifest.json {
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
        try_files $uri =404;
    }

    # ── SPA Fallback ────────────────────────────────────────────
    location / {
        limit_req zone=global burst=20 nodelay;
        try_files $uri $uri/ /index.html;
    }

    # ── Deny dotfiles ───────────────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Deny access to sensitive files ──────────────────────────
    location ~* \.(env|git|gitignore|dockerignore|md|yml|yaml|toml|lock)$ {
        deny all;
        return 404;
    }
}
