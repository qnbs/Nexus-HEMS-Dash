<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus HEMS Dashboard</title>
    <meta
      name="description"
      content="Real-time Home Energy Management System – PV, Battery, EV, KNX, Dynamic Tariffs & AI Optimizer"
    />
    <meta name="theme-color" content="#22ff88" />
    <link rel="icon" type="image/png" sizes="192x192" href="/Nexus-HEMS-Dash/icon-192x192.png" />
    <link rel="apple-touch-icon" href="/Nexus-HEMS-Dash/icon-192x192.png" />
    <link rel="manifest" href="/Nexus-HEMS-Dash/manifest.json" />
    <!-- GitHub Pages SPA redirect handler -->
    <script>
      (function () {
        var segmentCount = 1; // /Nexus-HEMS-Dash/ = 1 segment
        var l = window.location;
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('&');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <!-- Inline fallback prevents blank white screen while JS loads or during SW update -->
      <div
        id="app-loading"
        style="
          display: flex;
          align-items: center;
          justify-content: center;
          min-height: 100vh;
          background: #0f172a;
          color: #94a3b8;
          font-family: system-ui, sans-serif;
          flex-direction: column;
          gap: 1rem;
        "
      >
        <svg
          width="40"
          height="40"
          viewBox="0 0 24 24"
          fill="none"
          stroke="#22ff88"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" />
        </svg>
        <div style="font-size: 0.875rem">Loading Nexus HEMS…</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Fallback: if app hasn't rendered after 15s, show retry option
      setTimeout(function () {
        var el = document.getElementById('app-loading');
        if (el && el.parentElement && el.parentElement.children.length === 1) {
          var btn = document.createElement('button');
          btn.textContent = 'Retry';
          btn.style.cssText =
            'margin-top:1rem;padding:0.5rem 1.5rem;border-radius:0.5rem;border:1px solid #22ff88;background:transparent;color:#22ff88;cursor:pointer;font-size:0.875rem';
          btn.onclick = function () {
            // Unregister SW and hard reload to recover from broken cache
            if ('serviceWorker' in navigator) {
              navigator.serviceWorker.getRegistrations().then(function (regs) {
                regs.forEach(function (r) {
                  r.unregister();
                });
                caches.keys().then(function (names) {
                  names.forEach(function (n) {
                    caches.delete(n);
                  });
                  window.location.reload();
                });
              });
            } else {
              window.location.reload();
            }
          };
          el.appendChild(btn);
        }
      }, 15000);
    </script>
  </body>
</html>
