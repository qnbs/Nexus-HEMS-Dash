<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="40%" stop-color="#0e1e38"/>
      <stop offset="100%" stop-color="#081420"/>
    </linearGradient>
    <linearGradient id="bolt" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#22ff88"/>
      <stop offset="40%" stop-color="#18e8a0"/>
      <stop offset="100%" stop-color="#00e0ff"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22ff88" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#00e0ff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#22ff88" stop-opacity="0.35"/>
    </linearGradient>
    <radialGradient id="glow-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22ff88" stop-opacity="0.08"/>
      <stop offset="60%" stop-color="#22ff88" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#22ff88" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Subtle grid -->
  <g opacity="0.035" stroke="#22ff88" stroke-width="0.5">
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
  </g>
  <!-- Border ring -->
  <rect x="4" y="4" width="504" height="504" rx="105" fill="none" stroke="url(#ring)" stroke-width="1.5"/>
  <!-- Radial glow behind bolt -->
  <circle cx="256" cy="256" r="160" fill="url(#glow-bg)"/>
  <!-- Energy ring -->
  <circle cx="256" cy="256" r="130" fill="none" stroke="#22ff88" stroke-width="1" stroke-opacity="0.1" stroke-dasharray="8 12"/>
  <!-- Lightning bolt glow layer -->
  <g filter="url(#soft-glow)" transform="translate(256,256) scale(1.05) translate(-256,-256)">
    <polygon points="278,72 152,280 240,280 230,440 360,232 272,232 278,72" fill="#22ff88" opacity="0.25"/>
  </g>
  <!-- Lightning bolt main -->
  <g filter="url(#glow)" transform="translate(256,256) scale(1.05) translate(-256,-256)">
    <polygon points="278,72 152,280 240,280 230,440 360,232 272,232 278,72" fill="url(#bolt)"/>
  </g>
  <!-- Specular highlight -->
  <g transform="translate(256,256) scale(0.82) translate(-256,-256)">
    <polygon points="276,110 178,268 244,268 236,396 338,248 275,248 276,110" fill="white" opacity="0.07"/>
  </g>
</svg>
