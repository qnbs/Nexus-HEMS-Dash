name: Setup Node.js and pnpm
description: Install pnpm, Node with pnpm store cache, Corepack, and optional frozen install

inputs:
  node-version:
    description: Node.js version specifier for setup-node
    required: false
    default: '24'
  pnpm-version:
    description: pnpm major.minor.patch (keep in sync with package.json packageManager)
    required: false
    default: '10.33.0'
  install:
    description: When true, run pnpm install --frozen-lockfile
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
      with:
        version: ${{ inputs.pnpm-version }}
        run_install: false

    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm
        cache-dependency-path: pnpm-lock.yaml

    - name: Enable Corepack
      shell: bash
      run: corepack enable

    - name: Install dependencies
      if: ${{ inputs.install == 'true' }}
      shell: bash
      run: pnpm install --frozen-lockfile
