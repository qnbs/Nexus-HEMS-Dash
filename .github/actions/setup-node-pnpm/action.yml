name: Setup Node.js and pnpm
description: >
  Install pnpm, Node.js (from input or .nvmrc), and optional frozen dependencies.
  Centralises the repeated setup block used by every CI job.

inputs:
  node-version:
    description: Node.js version specifier for setup-node (overrides .nvmrc)
    required: false
    default: ""
  pnpm-version:
    description: pnpm major.minor.patch (keep in sync with package.json packageManager)
    required: false
    default: "10.33.0"
  install:
    description: When true, run pnpm install --frozen-lockfile
    required: false
    default: "true"

runs:
  using: composite
  steps:
    # Corepack must be enabled before setup-node so the pnpm cache backend is
    # discoverable. This matches the WorldScript-Studio action pattern and avoids
    # "pnpm: command not found" on runners where corepack is disabled by default.
    - name: Enable corepack
      shell: bash
      run: corepack enable

    - name: Setup pnpm
      uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
      with:
        version: ${{ inputs.pnpm-version }}
        run_install: false

    # When node-version is empty, fall back to .nvmrc so non-matrix jobs stay
    # pinned to the project's declared Node version.
    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: ${{ inputs.node-version }}
        node-version-file: ${{ inputs.node-version == '' && '.nvmrc' || '' }}
        cache: pnpm
        cache-dependency-path: pnpm-lock.yaml

    - name: Install dependencies
      if: ${{ inputs.install == 'true' }}
      shell: bash
      run: pnpm install --frozen-lockfile
