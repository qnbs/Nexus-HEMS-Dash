name: Deploy

on:
  # Auto-deploy the live demo on every push to main. main only accepts
  # green-CI PRs (branch ruleset), so a push here is already post-CI. The
  # deploy job still needs a successful build (needs: build), so a broken
  # build never publishes.
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      approveDeploy:
        description: 'Type DEPLOY to confirm production pages deployment'
        required: true
        default: 'NO'

# Read-only default; build/deploy jobs declare required scopes.
permissions: read-all

concurrency:
  group: 'pages'
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write # upload-pages-artifact

    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate runner compatibility (checkout v6)
        shell: bash
        run: |
          required="2.329.0"
          current="${ACTIONS_RUNNER_VERSION:-unknown}"
          echo "Runner version: ${current}"
          if [ "${current}" = "unknown" ]; then
            echo "::warning::ACTIONS_RUNNER_VERSION is not exposed; skipping strict runner version check."
            exit 0
          fi
          lowest=$(printf '%s\n%s\n' "${required}" "${current}" | sort -V | head -n1)
          if [ "${lowest}" != "${required}" ]; then
            echo "::error::Runner ${current} is below required ${required} for checkout v6 compatibility."
            exit 1
          fi

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Build
        run: pnpm build
        env:
          NODE_ENV: production

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: './apps/web/dist'

  deploy:
    # Auto-deploy on push to main; manual dispatch keeps the explicit DEPLOY gate.
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.approveDeploy == 'DEPLOY')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
        with:
          timeout: 1800000

  prune-deployments:
    # Auto-deploy creates one github-pages deployment per push, which pile up
    # (150+). After a successful deploy, keep only the newest few and delete the
    # rest so the environment's deployment list stays small.
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      deployments: write
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Prune old github-pages deployments (keep newest 10)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          KEEP=10
          ENV=github-pages
          mapfile -t ids < <(
            gh api --paginate \
              "repos/${REPO}/deployments?environment=${ENV}&per_page=100" \
              --jq '.[].id' | sort -rn
          )
          echo "Found ${#ids[@]} '${ENV}' deployments; keeping newest ${KEEP}."
          if [ "${#ids[@]}" -le "${KEEP}" ]; then
            echo "Nothing to prune."
            exit 0
          fi
          for id in "${ids[@]:${KEEP}}"; do
            # A deployment must be marked inactive before it can be deleted.
            gh api -X POST "repos/${REPO}/deployments/${id}/statuses" \
              -f state=inactive >/dev/null 2>&1 || true
            if gh api -X DELETE "repos/${REPO}/deployments/${id}" >/dev/null 2>&1; then
              echo "deleted deployment ${id}"
            else
              echo "::warning::could not delete deployment ${id}"
            fi
          done
