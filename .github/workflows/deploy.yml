name: Deploy

on:
  workflow_dispatch:
    inputs:
      approveDeploy:
        description: 'Type DEPLOY to confirm production pages deployment'
        required: true
        default: 'NO'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate runner compatibility (checkout v6)
        shell: bash
        run: |
          required="2.329.0"
          current="${ACTIONS_RUNNER_VERSION:-unknown}"
          echo "Runner version: ${current}"
          if [ "${current}" = "unknown" ]; then
            echo "::warning::ACTIONS_RUNNER_VERSION is not exposed; skipping strict runner version check."
            exit 0
          fi
          lowest=$(printf '%s\n%s\n' "${required}" "${current}" | sort -V | head -n1)
          if [ "${lowest}" != "${required}" ]; then
            echo "::error::Runner ${current} is below required ${required} for checkout v6 compatibility."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: './dist'

  deploy:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.approveDeploy == 'DEPLOY'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
