# ─────────────────────────────────────────────────────────────────────────────
# Weekly deep-scan (schedule-only)
# ─────────────────────────────────────────────────────────────────────────────
# Push/PR-Gate runs in `security-full.yml`. This workflow exists to surface
# slower / supplementary scans on a Monday cadence:
#   - License compliance (informational)
#   - Full pnpm audit including dev-deps (security-full.yml audits prod-only)
# Triggering on push/PR was redundant with security-full.yml — removed in
# Phase-2 hardening (May 2026).
# ─────────────────────────────────────────────────────────────────────────────

name: Security Deep-Scan (weekly)

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-scan-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. License Compliance (informational)
  # ──────────────────────────────────────────────────────────────────────────
  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Check production licenses (block on GPL/AGPL)
        run: npx license-checker --production --failOn 'GPL-3.0;AGPL-3.0' --summary
        continue-on-error: true

      - name: License summary
        run: |
          echo "## License Compliance Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          npx license-checker --production --summary 2>&1 | tail -50 >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Full audit including dev-deps (push gate audits prod-only)
  # ──────────────────────────────────────────────────────────────────────────
  audit-full:
    name: Full Dependency Audit (incl. dev-deps)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Audit ALL deps (including dev-deps, informational)
        run: |
          echo "## Full pnpm Audit (incl. dev-deps)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          pnpm audit --audit-level=high 2>&1 | tail -40 >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "_Production-deps gate runs on every push in security-full.yml._" >> "$GITHUB_STEP_SUMMARY"
        continue-on-error: true
