name: Chromatic

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: read-all

concurrency:
  group: chromatic-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  chromatic:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@a15d269cd4658e1107c09f1fabf4cbd7bd1f308a # v4.4.0
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Storybook
        run: pnpm storybook:build

      - name: Publish to Chromatic
        if: env.CHROMATIC_PROJECT_TOKEN != ''
        uses: chromaui/action@0794e6939fe40ce46a88963f818092afc427da5b # latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          storybookBuildDir: apps/web/storybook-static
          exitZeroOnChanges: true
          autoAcceptChanges: main
          onlyChanged: true
          # Hard-fail the build when visual regressions are detected on PR branches
          # (auto-accept keeps main green after deliberate UI changes)
          exitOnceUploaded: false
        env:
          CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}

      - name: Check Chromatic gate (fail on unreviewed changes)
        if: |
          env.CHROMATIC_PROJECT_TOKEN != '' &&
          github.event_name == 'pull_request' &&
          github.base_ref == 'main'
        shell: bash
        run: |
          # Chromatic sets CHROMATIC_STORYBOOK_URL on success; absence means regressions
          if [[ -z "${CHROMATIC_STORYBOOK_URL:-}" ]]; then
            echo "::error::Chromatic detected unreviewed visual changes. Review at https://www.chromatic.com"
            exit 1
          fi
          echo "Chromatic gate passed — no unreviewed visual regressions"
