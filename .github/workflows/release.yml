name: Release

# Manual-only: semantic-release is not triggered on push to main.
# Cut releases via Actions → Release → Run workflow (approveRelease=RELEASE).
# See docs/adr/ADR-015-release-automation.md and docs/Manual-Workflow-Triggers.md.
on:
  workflow_dispatch:
    inputs:
      approveRelease:
        description: 'Type RELEASE to run semantic-release (bump, CHANGELOG, tag, GitHub Release)'
        required: true
        default: 'NO'

# Read-only default; release job grants write scopes explicitly.
permissions: read-all

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: github.event.inputs.approveRelease == 'RELEASE'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    timeout-minutes: 15
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          # GH_TOKEN (PAT) needed to push to protected branches when cutting a release.
          token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Build
        run: pnpm build

      - name: Semantic Release
        id: semantic
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: pnpm release

      - name: Release status summary
        if: always()
        run: |
          if [ "${{ steps.semantic.outputs.new_release_published }}" = "true" ]; then
            echo "✅ Released v${{ steps.semantic.outputs.new_release_version }}" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ steps.semantic.outcome }}" = "failure" ]; then
            echo "::warning::semantic-release failed — likely cannot push to the protected main branch."
            {
              echo "## ⚠️ Release did not run"
              echo ""
              echo "semantic-release failed — most likely it cannot push the release commit/tag to the protected \`main\` branch."
              echo "Fix: add a \`GH_TOKEN\` PAT secret (repo scope) or a ruleset bypass for \`github-actions[bot]\`."
              echo "Fallback: cut releases manually per **docs/adr/ADR-015-release-automation.md**."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "ℹ️ No release necessary (no release-worthy commits since the last tag)." >> "$GITHUB_STEP_SUMMARY"
          fi
