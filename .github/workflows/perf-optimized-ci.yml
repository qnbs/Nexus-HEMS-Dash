# ─────────────────────────────────────────────────────────────────────────────
# Performance-Optimized CI Pipeline (manual / experimental)
# ─────────────────────────────────────────────────────────────────────────────
#
# Primary merge/PR gate is .github/workflows/ci.yml — this workflow does NOT run on
# push, to avoid duplicate full CI on every commit. Run via workflow_dispatch when
# benchmarking the optimized layout (parallel jobs, extra caches).
#
# Optimization strategies vs. original ci.yml:
#
# 1. DEPENDENCY CACHING
#    - actions/cache for node_modules (hash-locked to pnpm-lock.yaml)
#    - pnpm install --frozen-lockfile after cache restore for deterministic installs
#    → Saves ~25-40s per job (×4 jobs = ~2 min total)
#
# 2. PARALLEL JOBS (fan-out / fan-in)
#    - Original: lint → test → build → e2e (sequential, ~12-15 min)
#    - Optimized: install → [lint | test | build] → e2e (parallel)
#    → Saves ~50-60% wall-clock time
#
# 3. BUILD ARTIFACT REUSE
#    - Build once in 'build' job, download in e2e via actions/cache
#    - E2E uses `npx vite preview` on pre-built dist/ instead of dev server
#    → Saves ~45s build + eliminates redundant compilation
#
# 4. PLAYWRIGHT BROWSER CACHING
#    - Cache ~/.cache/ms-playwright keyed on pnpm-lock.yaml
#    → Saves browser downloads for CI's Chromium + Firefox E2E coverage
#
# 5. VITE BUILD CACHE
#    - Cache node_modules/.vite keyed on source hash
#    → Saves ~10-20s on incremental builds
#
# 6. COMPRESSED ARTIFACTS
#    - compression-level: 6 on uploads, reduces transfer time
#    → Saves ~5-10s on artifact upload/download
#
# Expected improvement: 50-80% faster (12-15 min → 3-5 min)
# ─────────────────────────────────────────────────────────────────────────────

name: CI (Optimized)

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-optimized-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Reduce package-manager noise and speed up installs
  npm_config_fund: 'false'
  npm_config_audit: 'false'
  npm_config_loglevel: 'error'

# ─────────────────────────────────────────────────────────────────────────────
# Phase 1: Install & Cache (single job, shared by all downstream)
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  install:
    name: 📦 Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore node_modules cache
        id: deps-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: deps-${{ runner.os }}-node${{ env.NODE_VERSION }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Setup Node.js and pnpm (with install)
        uses: ./.github/actions/setup-node-pnpm

  # ─────────────────────────────────────────────────────────────────────────
  # Phase 2: Parallel quality gates (lint, test, build run simultaneously)
  # ─────────────────────────────────────────────────────────────────────────

  lint:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore node_modules
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: deps-${{ runner.os }}-node${{ env.NODE_VERSION }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Setup Node.js and pnpm (no install — restored from cache)
        uses: ./.github/actions/setup-node-pnpm
        with:
          install: 'false'

      - name: Lint
        run: pnpm lint
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      - name: Type Check
        run: pnpm type-check
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore node_modules
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: deps-${{ runner.os }}-node${{ env.NODE_VERSION }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Setup Node.js and pnpm (no install — restored from cache)
        uses: ./.github/actions/setup-node-pnpm
        with:
          install: 'false'

      - name: Unit Tests with Coverage
        run: pnpm test:coverage
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      - name: Upload coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: coverage-report
          path: apps/web/coverage/
          retention-days: 7
          compression-level: 6

  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore node_modules
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: deps-${{ runner.os }}-node${{ env.NODE_VERSION }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Setup Node.js and pnpm (no install — restored from cache)
        uses: ./.github/actions/setup-node-pnpm
        with:
          install: 'false'

      - name: Cache Vite build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: apps/web/node_modules/.vite
          key: vite-${{ runner.os }}-${{ hashFiles('apps/web/src/**', 'apps/web/index.html', 'apps/web/vite.config.ts', 'apps/web/tailwind.config.ts') }}
          restore-keys: |
            vite-${{ runner.os }}-

      - name: Build
        run: pnpm build
        env:
          NODE_ENV: production
          VITE_E2E_TESTING: 'true'
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      # Bundle-size enforcement is delegated to size-limit (single source of
      # truth: apps/web/package.json "size-limit"). The earlier inline check
      # mixed uncompressed and gzipped sizes — removed in Phase-2 hardening.
      - name: size-limit check
        run: pnpm size

      - name: depcheck
        run: npx depcheck 2>&1 || true

      - name: Cache build artifacts
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: apps/web/dist
          key: build-${{ github.sha }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build
          path: apps/web/dist/
          retention-days: 7
          compression-level: 6

  # ─────────────────────────────────────────────────────────────────────────
  # Phase 3: Integration tests (use cached build, parallel with docker)
  # ─────────────────────────────────────────────────────────────────────────

  e2e:
    name: 🎭 E2E Tests
    runs-on: ubuntu-latest
    needs: [build, lint]
    # CI runs Chromium + Firefox; workers:2 + retries:1 keeps the suite under 30 min.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore node_modules
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: deps-${{ runner.os }}-node${{ env.NODE_VERSION }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Setup Node.js and pnpm (no install — restored from cache)
        uses: ./.github/actions/setup-node-pnpm
        with:
          install: 'false'

      - name: Restore build artifacts
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: apps/web/dist
          key: build-${{ github.sha }}

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright Chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        timeout-minutes: 20
        run: pnpm --filter @nexus-hems/web exec playwright install --with-deps chromium

      - name: Install Playwright deps (cached browsers)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @nexus-hems/web exec playwright install-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e -- --project=chromium
        env:
          CI: true
          VITE_E2E_TESTING: 'true'

      - name: Upload Playwright Report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
          compression-level: 6

  # ─────────────────────────────────────────────────────────────────────────
  # Phase 4: Security gate (parallel with Phase 2)
  # ─────────────────────────────────────────────────────────────────────────

  security:
    name: 🔒 Security Gate
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify security workflow exists
        run: |
          if [ ! -f .github/workflows/security-full.yml ]; then
            echo "::error::security-full.yml not found"
            exit 1
          fi
          echo "✅ security-full.yml is configured and runs on push/PR to main"

  # ─────────────────────────────────────────────────────────────────────────
  # Final: Status check gate (required for branch protection)
  # ─────────────────────────────────────────────────────────────────────────

  ci-passed:
    name: ✅ CI Passed
    if: always()
    needs: [lint, test, build, e2e, security]
    runs-on: ubuntu-latest
    steps:
      - name: Check job results
        run: |
          echo "Lint:     ${{ needs.lint.result }}"
          echo "Test:     ${{ needs.test.result }}"
          echo "Build:    ${{ needs.build.result }}"
          echo "E2E:      ${{ needs.e2e.result }}"
          echo "Security: ${{ needs.security.result }}"

          if [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.test.result }}" != "success" ]] || \
             [[ "${{ needs.build.result }}" != "success" ]] || \
             [[ "${{ needs.e2e.result }}" != "success" ]] || \
             [[ "${{ needs.security.result }}" != "success" ]]; then
            echo "::error::At least one required optimized CI job did not pass"
            exit 1
          fi
          echo "✅ All optimized CI jobs passed!"
