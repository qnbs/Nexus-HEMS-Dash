name: SBOM & Vulnerability Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily scan — 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  id-token: write  # required for cosign keyless signing

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ════════════════════════════════════════════════════════════════
  #  1. Dependency Audit (pnpm)
  # ════════════════════════════════════════════════════════════════
  dependency-audit:
    name: pnpm Dependency Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@a15d269cd4658e1107c09f1fabf4cbd7bd1f308a # v4.4.0
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit (production deps only)
        run: pnpm audit --audit-level=high --prod
        # Only audits production (non-dev) dependencies.
        # Dev-tool CVEs (@log4brains/cli, @lhci/cli, autoprefixer) are informational
        # and tracked in security-full.yml as low-risk dev-only findings.
        continue-on-error: false

  # ════════════════════════════════════════════════════════════════
  #  2. Syft SBOM Generation (frontend image)
  # ════════════════════════════════════════════════════════════════
  sbom-frontend:
    name: SBOM — Frontend Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@a15d269cd4658e1107c09f1fabf4cbd7bd1f308a # v4.4.0
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend Docker image
        continue-on-error: true
        run: |
          docker build \
            --build-arg VCS_REF="${{ github.sha }}" \
            --build-arg BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --build-arg VERSION="${{ github.ref_name }}" \
            -t nexus-hems-frontend:${{ github.sha }} \
            -f Dockerfile .

      - name: Generate SBOM (syft)
        continue-on-error: true
        uses: anchore/sbom-action@v0
        with:
          image: nexus-hems-frontend:${{ github.sha }}
          format: spdx-json
          output-file: sbom-frontend.spdx.json
          artifact-name: sbom-frontend-${{ github.sha }}.spdx.json

      - name: Scan for vulnerabilities (grype)
        id: grype-frontend
        continue-on-error: true
        uses: anchore/scan-action@v4
        with:
          image: nexus-hems-frontend:${{ github.sha }}
          fail-build: true
          severity-cutoff: critical
          output-format: sarif
          output-file: grype-frontend.sarif

      - name: Upload SARIF results to GitHub Security
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@b1bff81932f5cdfc8695c7752dcee935dcd061c8 # v4.33.0
        with:
          sarif_file: grype-frontend.sarif
          category: grype-frontend

  # ════════════════════════════════════════════════════════════════
  #  3. Syft SBOM Generation (backend image)
  # ════════════════════════════════════════════════════════════════
  sbom-backend:
    name: SBOM — Backend Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@a15d269cd4658e1107c09f1fabf4cbd7bd1f308a # v4.4.0
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '24'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build backend Docker image
        continue-on-error: true
        run: |
          docker build \
            --build-arg VCS_REF="${{ github.sha }}" \
            --build-arg BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --build-arg VERSION="${{ github.ref_name }}" \
            -t nexus-hems-backend:${{ github.sha }} \
            -f Dockerfile.server .

      - name: Generate SBOM (syft)
        continue-on-error: true
        uses: anchore/sbom-action@v0
        with:
          image: nexus-hems-backend:${{ github.sha }}
          format: spdx-json
          output-file: sbom-backend.spdx.json
          artifact-name: sbom-backend-${{ github.sha }}.spdx.json

      - name: Scan for vulnerabilities (grype)
        id: grype-backend
        continue-on-error: true
        uses: anchore/scan-action@v4
        with:
          image: nexus-hems-backend:${{ github.sha }}
          fail-build: true
          severity-cutoff: critical
          output-format: sarif
          output-file: grype-backend.sarif

      - name: Upload SARIF results to GitHub Security
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@b1bff81932f5cdfc8695c7752dcee935dcd061c8 # v4.33.0
        with:
          sarif_file: grype-backend.sarif
          category: grype-backend

  # ════════════════════════════════════════════════════════════════
  #  4. Filesystem SBOM (source code + dependencies)
  # ════════════════════════════════════════════════════════════════
  sbom-source:
    name: SBOM — Source & Dependencies
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Generate filesystem SBOM (syft)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom-source.spdx.json
          artifact-name: sbom-source-${{ github.sha }}.spdx.json

      - name: Scan filesystem for vulnerabilities (grype)
        uses: anchore/scan-action@v4
        with:
          path: .
          fail-build: false  # informational only for source scan
          severity-cutoff: critical
          output-format: sarif
          output-file: grype-source.sarif

      - name: Upload SARIF results to GitHub Security
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@b1bff81932f5cdfc8695c7752dcee935dcd061c8 # v4.33.0
        with:
          sarif_file: grype-source.sarif
          category: grype-source
