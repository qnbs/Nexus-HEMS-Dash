name: Renovate

on:
  # Daily at 05:00 UTC (07:00 Berlin)
  schedule:
    - cron: '0 5 * * *'
  # Manual trigger
  workflow_dispatch:
    inputs:
      dryRun:
        description: 'Dry run (no PRs created)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

permissions: read-all

jobs:
  renovate:
    name: Renovate
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    if: github.repository == 'qnbs/Nexus-HEMS-Dash'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Self-hosted Renovate
        if: env.RENOVATE_TOKEN != ''
        uses: renovatebot/github-action@87c405b9750f1b6affae06311395b50e3882d54f # v42.0.6
        with:
          configurationFile: .renovaterc.json
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
          LOG_LEVEL: info
          RENOVATE_DRY_RUN: ${{ github.event.inputs.dryRun || 'false' }}
