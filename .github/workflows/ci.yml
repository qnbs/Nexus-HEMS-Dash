name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-primary-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # 0. SECURITY GATE — runs first and blocks everything downstream
  # ═══════════════════════════════════════════════════════════════════════════
  security-audit:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # fetch-depth:0 is required by dependency-review-action and for any
          # future git-history-based secret scanning.
          fetch-depth: 0

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      # Existing production dependencies currently have HIGH-severity advisories
      # (e.g. ws, protobufjs). This step surfaces them but does not block the
      # pipeline while a dedicated remediation issue is open.
      - name: pnpm audit — report HIGH/CRITICAL CVEs (production)
        continue-on-error: true
        run: pnpm audit --audit-level=high --prod

      - name: Dependency review (PRs only)
        # Requires Dependency graph enabled in repository settings.
        # Non-fatal while settings are being configured; still surfaces findings.
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5

  # ═══════════════════════════════════════════════════════════════════════════
  # 1. QUALITY GATE — lint, type-check, unit tests, and build in parallel
  # ═══════════════════════════════════════════════════════════════════════════
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    needs: [security-audit]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Lint
        run: pnpm lint
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      - name: Type Check
        run: pnpm type-check
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: [security-audit]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: API Unit Tests
        run: pnpm --filter @nexus-hems/api test:run
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      - name: Web Unit Tests with Coverage
        run: pnpm test:coverage
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      - name: Upload coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: coverage-report
          path: apps/web/coverage/
          retention-days: 14

  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: [security-audit]
    permissions:
      contents: read
      # SLSA build-provenance attestation only on push to main (see attest step).
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Build
        run: pnpm build
        env:
          VITE_E2E_TESTING: "true"
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      - name: Resolve web app version
        id: web-version
        run: |
          VERSION=$(node -p "require('./apps/web/package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved web app version: ${VERSION}"

      - name: Sentry Source Maps Upload
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          WEB_VERSION: ${{ steps.web-version.outputs.version }}
        run: |
          if [ -n "$SENTRY_AUTH_TOKEN" ]; then
            RELEASE="nexus-hems@${WEB_VERSION}"
            npx @sentry/cli releases new "$RELEASE"
            npx @sentry/cli releases files "$RELEASE" upload-sourcemaps apps/web/dist/assets --url-prefix '~/Nexus-HEMS-Dash/assets'
            npx @sentry/cli releases finalize "$RELEASE"
            echo "✅ Sentry source maps uploaded for $RELEASE"
          else
            echo "⏭️ SENTRY_AUTH_TOKEN not set — skipping source map upload"
          fi

      # Bundle-size enforcement is delegated to size-limit, which is the
      # single source of truth (`apps/web/package.json` "size-limit" field).
      - name: Size Limit Check
        run: pnpm size
        env:
          VITE_E2E_TESTING: "true"

      - name: Smoke-test production build (mounts, no runtime crash)
        run: |
          pnpm --filter @nexus-hems/web exec playwright install --with-deps chromium-headless-shell
          pnpm --filter @nexus-hems/web smoke:prod
        env:
          CI: "true"

      # SLSA Level 3 build-provenance: cryptographic attestation of the full
      # build output produced from `main`. Verify with `gh attestation verify`.
      - name: Generate SLSA build-provenance attestation
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: "apps/web/dist/**"

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build
          path: apps/web/dist/
          retention-days: 7

      - name: Upload bundle analysis
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bundle-analysis
          path: apps/web/dist/bundle-stats.html
          if-no-files-found: ignore
          retention-days: 14

  # ═══════════════════════════════════════════════════════════════════════════
  # 2. INTEGRATION & VISUAL TESTS — run after a successful build
  # ═══════════════════════════════════════════════════════════════════════════
  e2e-tests:
    name: 🎭 E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build
          path: apps/web/dist

      - name: Install Playwright Browsers
        run: pnpm --filter @nexus-hems/web exec playwright install --with-deps chromium firefox

      - name: Run Playwright tests
        run: pnpm test:e2e
        env:
          VITE_E2E_TESTING: "true"

      - name: Upload Playwright Report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 14

  storybook:
    name: 📖 Storybook Build
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Build Storybook
        run: pnpm storybook:build

      - name: Upload Storybook build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: storybook-build
          path: apps/web/storybook-static/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════════
  # 3. DEPLOY — GitHub Pages on main only
  # ═══════════════════════════════════════════════════════════════════════════
  deploy:
    name: 🚀 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [build, e2e-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: build
          path: ./apps/web/dist

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: "./apps/web/dist"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

  # ═══════════════════════════════════════════════════════════════════════════
  # 4. FINAL GATE — single required status check for branch protection
  # ═══════════════════════════════════════════════════════════════════════════
  ci-passed:
    name: ✅ CI Passed
    runs-on: ubuntu-latest
    if: always()
    needs:
      - security-audit
      - lint-typecheck
      - unit-tests
      - build
      - e2e-tests
      - storybook
      - deploy
    steps:
      - name: Evaluate full CI workflow
        run: |
          echo "Security Audit:   ${{ needs.security-audit.result }}"
          echo "Lint & Type Check: ${{ needs.lint-typecheck.result }}"
          echo "Unit Tests:        ${{ needs.unit-tests.result }}"
          echo "Build:             ${{ needs.build.result }}"
          echo "E2E Tests:         ${{ needs.e2e-tests.result }}"
          echo "Storybook Build:   ${{ needs.storybook.result }}"
          echo "Deploy:            ${{ needs.deploy.result }}"

          # Deploy is only expected to run on main pushes; skipped otherwise is OK.
          DEPLOY_OK="${{ needs.deploy.result }}"
          if [ "$DEPLOY_OK" = "skipped" ]; then
            DEPLOY_OK="success"
          fi

          if [[ "${{ needs.security-audit.result }}" != "success" || \
                "${{ needs.lint-typecheck.result }}" != "success" || \
                "${{ needs.unit-tests.result }}" != "success" || \
                "${{ needs.build.result }}" != "success" || \
                "${{ needs.e2e-tests.result }}" != "success" || \
                "${{ needs.storybook.result }}" != "success" || \
                "$DEPLOY_OK" != "success" ]]; then
            echo "::error::At least one required CI job did not pass"
            exit 1
          fi
          echo "✅ All CI jobs passed"
