name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Security Audit
        run: pnpm audit --audit-level=high || true

      - name: Lint
        run: pnpm lint

      - name: Type Check
        run: pnpm type-check

      - name: Format Check
        run: pnpm format:check

  node25-canary:
    name: Node 25 Canary
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js (Canary)
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '25'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type Check (Canary)
        run: pnpm type-check

      - name: Build (Canary)
        run: pnpm build

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Unit Tests with Coverage
        run: pnpm exec vitest run --reporter=verbose --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  build:
    name: build
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Sentry Source Maps Upload
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          if [ -n "$SENTRY_AUTH_TOKEN" ]; then
            npx @sentry/cli releases new "nexus-hems@$(node -p 'require("./package.json").version')"
            npx @sentry/cli releases files "nexus-hems@$(node -p 'require("./package.json").version')" upload-sourcemaps dist/assets --url-prefix '~/Nexus-HEMS-Dash/assets'
            npx @sentry/cli releases finalize "nexus-hems@$(node -p 'require("./package.json").version')"
            echo "✅ Sentry source maps uploaded"
          else
            echo "⏭️ SENTRY_AUTH_TOKEN not set — skipping source map upload"
          fi

      - name: Bundle Size Check
        run: |
          MAX_KB=600
          INDEX_SIZE=$(stat -c%s dist/assets/index-*.js 2>/dev/null || echo 0)
          INDEX_KB=$((INDEX_SIZE / 1024))
          echo "Index bundle: ${INDEX_KB} KB (limit: ${MAX_KB} KB)"
          if [ "$INDEX_KB" -gt "$MAX_KB" ]; then
            echo "::error::Bundle size ${INDEX_KB} KB exceeds ${MAX_KB} KB budget"
            exit 1
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: build
          path: dist/
          retention-days: 7

  e2e-tests:
    name: 🎭 E2E Tests
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: pnpm test:e2e

      - name: Upload Playwright Report
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate Dockerfile
        run: docker build --target production -t nexus-hems-dash:ci .

  # ──────────────────────────────────────────────
  # Security Gate — requires Security Full workflow to pass
  # ──────────────────────────────────────────────
  security:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [lint-typecheck]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify security workflow exists
        run: |
          if [ ! -f .github/workflows/security-full.yml ]; then
            echo "::error::security-full.yml not found"
            exit 1
          fi
          echo "✅ security-full.yml is configured and runs on push/PR to main"

  ci-passed:
    name: ✅ CI Passed
    runs-on: ubuntu-latest
    if: always()
    needs:
      - lint-typecheck
      - unit-tests
    steps:
      - name: Evaluate CI baseline
        run: |
          echo "Lint & Type Check: ${{ needs.lint-typecheck.result }}"
          echo "Unit Tests: ${{ needs.unit-tests.result }}"
          if [[ "${{ needs.lint-typecheck.result }}" != "success" || "${{ needs.unit-tests.result }}" != "success" ]]; then
            echo "::error::CI baseline failed"
            exit 1
          fi
