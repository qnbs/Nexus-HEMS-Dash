name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npm run type-check

      - name: Format Check
        run: npm run format:check

      - name: Unit Tests
        run: npx vitest run --reporter=verbose

      - name: Build
        run: npm run build

      - name: Bundle Size Check
        run: |
          MAX_KB=600
          INDEX_SIZE=$(stat -c%s dist/assets/index-*.js 2>/dev/null || echo 0)
          INDEX_KB=$((INDEX_SIZE / 1024))
          echo "Index bundle: ${INDEX_KB} KB (limit: ${MAX_KB} KB)"
          if [ "$INDEX_KB" -gt "$MAX_KB" ]; then
            echo "::error::Bundle size ${INDEX_KB} KB exceeds ${MAX_KB} KB budget"
            exit 1
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: dist/
          retention-days: 7
