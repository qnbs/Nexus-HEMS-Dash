name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-primary-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Security Audit
        run: pnpm audit --audit-level=high --prod || true

      - name: Lint
        run: pnpm lint
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      - name: Type Check
        run: pnpm type-check
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

  helm-chart:
    name: Helm Chart Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Helm
        uses: azure/setup-helm@511ed8c345b4d86fe0c3147cbee5b2a1d5e2e9b2 # v4.2.0
        with:
          version: v3.16.4

      - name: Lint Helm chart
        run: helm lint helm/nexus-hems

      - name: Render chart template smoke
        run: helm template nexus-hems helm/nexus-hems > /tmp/nexus-hems-rendered.yaml

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: API Unit Tests with Coverage
        run: pnpm --filter @nexus-hems/api test:coverage
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      - name: Web Unit Tests with Coverage
        run: pnpm test:coverage
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      - name: Coverage baseline gate (PRF-03)
        run: pnpm check:coverage-baseline

      - name: Upload coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: coverage-report
          path: apps/web/coverage/
          retention-days: 14

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-typecheck
    permissions:
      contents: read
      # SLSA build-provenance attestation only on push to main (see attest step).
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Build
        run: pnpm build
        env:
          VITE_E2E_TESTING: 'true'
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      - name: Resolve web app version
        id: web-version
        run: |
          VERSION=$(node -p "require('./apps/web/package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved web app version: ${VERSION}"

      - name: Sentry Source Maps Upload
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          WEB_VERSION: ${{ steps.web-version.outputs.version }}
        run: |
          if [ -n "$SENTRY_AUTH_TOKEN" ]; then
            RELEASE="nexus-hems@${WEB_VERSION}"
            npx @sentry/cli releases new "$RELEASE"
            npx @sentry/cli releases files "$RELEASE" upload-sourcemaps apps/web/dist/assets --url-prefix '~/Nexus-HEMS-Dash/assets'
            npx @sentry/cli releases finalize "$RELEASE"
            echo "✅ Sentry source maps uploaded for $RELEASE"
          else
            echo "⏭️ SENTRY_AUTH_TOKEN not set — skipping source map upload"
          fi

      # Bundle-size enforcement is delegated to size-limit, which is the
      # single source of truth (`apps/web/package.json` "size-limit" field).
      # The previous inline check was uncompressed-vs-gzipped inconsistent.
      - name: Size Limit Check
        run: pnpm size
        env:
          VITE_E2E_TESTING: 'true'

      # Production-build smoke test: loads the just-built dist/ in headless
      # Chromium and fails if React does not mount or a runtime error fires.
      # Catches "build succeeds but app white-screens" that unit tests cannot.
      - name: Smoke-test production build (mounts, no runtime crash)
        run: |
          pnpm --filter @nexus-hems/web exec playwright install --with-deps chromium-headless-shell
          pnpm --filter @nexus-hems/web smoke:prod
        env:
          CI: 'true'
          VITE_E2E_TESTING: 'true'

      # SLSA Level 3 build-provenance: cryptographic attestation of every JS
      # asset produced from `main`. Verify with `gh attestation verify`.
      - name: Generate SLSA build-provenance attestation
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: 'apps/web/dist/assets/*.js'

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build
          path: apps/web/dist/
          retention-days: 7

  e2e-tests:
    name: 🎭 E2E Tests
    runs-on: ubuntu-latest
    needs: build
    # PR CI runs Chromium only to keep the suite fast on ubuntu-latest. Firefox
    # coverage can be added back via a separate matrix entry or nightly job once
    # the suite is consistently under 15 min with both browsers.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build
          path: apps/web/dist

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-chromium-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright Chromium (browser only)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        timeout-minutes: 10
        run: pnpm --filter @nexus-hems/web exec playwright install chromium

      - name: Install Playwright system dependencies
        if: steps.pw-cache.outputs.cache-hit != 'true'
        timeout-minutes: 10
        run: pnpm --filter @nexus-hems/web exec playwright install-deps chromium

      - name: Run Playwright tests
        run: pnpm test:e2e -- --project=chromium
        env:
          VITE_E2E_TESTING: 'true'

      - name: Upload Playwright Report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 14

  # ──────────────────────────────────────────────
  # Security Gate — pnpm audit + dependency allowlist check
  # This job BLOCKS CI on HIGH/CRITICAL vulnerabilities.
  # Advisory-level findings do not block but do emit warnings.
  # ──────────────────────────────────────────────
  security:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [lint-typecheck]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Audit — block on HIGH/CRITICAL CVEs (production deps only)
        run: pnpm audit --audit-level=high --prod
        # Only audits production (non-dev) dependencies.
        # Dev-tool CVEs (@log4brains/cli, @lhci/cli, autoprefixer) are out of scope
        # for production security and are tracked separately in sbom-scan.yml.

      - name: Verify extended security workflows exist
        run: |
          if [ ! -f .github/workflows/security-full.yml ]; then
            echo "::error::security-full.yml not found — required for extended SAST and secret scanning"
            exit 1
          fi
          if [ ! -f .github/workflows/sbom-scan.yml ]; then
            echo "::error::sbom-scan.yml not found — required for SBOM generation"
            exit 1
          fi
          echo "✅ extended security workflows present"

  fuzz-tests:
    name: Security Fuzz Tests
    runs-on: ubuntu-latest
    needs: [lint-typecheck]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Run security fuzz tests
        run: pnpm test:fuzz

  ci-passed:
    name: ✅ CI Passed
    runs-on: ubuntu-latest
    if: always()
    needs:
      - lint-typecheck
      - helm-chart
      - unit-tests
      - build
      - e2e-tests
      - security
      - fuzz-tests
    steps:
      - name: Evaluate full CI workflow
        run: |
          echo "Lint & Type Check: ${{ needs.lint-typecheck.result }}"
          echo "Helm Chart Lint: ${{ needs.helm-chart.result }}"
          echo "Unit Tests: ${{ needs.unit-tests.result }}"
          echo "Build: ${{ needs.build.result }}"
          echo "E2E Tests: ${{ needs.e2e-tests.result }}"
          echo "Security Gate: ${{ needs.security.result }}"
          echo "Fuzz Tests: ${{ needs.fuzz-tests.result }}"
          if [[ "${{ needs.lint-typecheck.result }}" != "success" || \
                "${{ needs.helm-chart.result }}" != "success" || \
                "${{ needs.unit-tests.result }}" != "success" || \
                "${{ needs.build.result }}" != "success" || \
                "${{ needs.e2e-tests.result }}" != "success" || \
                "${{ needs.security.result }}" != "success" || \
                "${{ needs.fuzz-tests.result }}" != "success" ]]; then
            echo "::error::At least one required CI job did not pass"
            exit 1
          fi
          echo "✅ All CI jobs passed"
