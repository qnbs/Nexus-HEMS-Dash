name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-primary-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Security Audit
        run: pnpm audit --audit-level=high --prod || true

      - name: Lint
        run: pnpm lint
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      - name: Type Check
        run: pnpm type-check
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-typecheck
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: API Unit Tests
        run: pnpm --filter @nexus-hems/api test:run
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      - name: Web Unit Tests with Coverage
        run: pnpm test:coverage
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      - name: Upload coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: coverage-report
          path: apps/web/coverage/
          retention-days: 14

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-typecheck
    permissions:
      contents: read
      # SLSA build-provenance attestation only on push to main (see attest step).
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Build
        run: pnpm build
        env:
          VITE_E2E_TESTING: 'true'
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

      - name: Resolve web app version
        id: web-version
        run: |
          VERSION=$(node -p "require('./apps/web/package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved web app version: ${VERSION}"

      - name: Sentry Source Maps Upload
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          WEB_VERSION: ${{ steps.web-version.outputs.version }}
        run: |
          if [ -n "$SENTRY_AUTH_TOKEN" ]; then
            RELEASE="nexus-hems@${WEB_VERSION}"
            npx @sentry/cli releases new "$RELEASE"
            npx @sentry/cli releases files "$RELEASE" upload-sourcemaps apps/web/dist/assets --url-prefix '~/Nexus-HEMS-Dash/assets'
            npx @sentry/cli releases finalize "$RELEASE"
            echo "✅ Sentry source maps uploaded for $RELEASE"
          else
            echo "⏭️ SENTRY_AUTH_TOKEN not set — skipping source map upload"
          fi

      # Bundle-size enforcement is delegated to size-limit, which is the
      # single source of truth (`apps/web/package.json` "size-limit" field).
      # The previous inline check was uncompressed-vs-gzipped inconsistent.
      - name: Size Limit Check
        run: pnpm size
        env:
          VITE_E2E_TESTING: 'true'

      # SLSA Level 3 build-provenance: cryptographic attestation of every JS
      # asset produced from `main`. Verify with `gh attestation verify`.
      - name: Generate SLSA build-provenance attestation
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: 'apps/web/dist/assets/*.js'

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build
          path: apps/web/dist/
          retention-days: 7

  e2e-tests:
    name: 🎭 E2E Tests
    runs-on: ubuntu-latest
    needs: build
    # CI runs Chromium + Firefox; workers:2 + retries:1 keeps the suite under 30 min.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build
          path: apps/web/dist

      - name: Install Playwright Browsers
        run: pnpm --filter @nexus-hems/web exec playwright install --with-deps chromium firefox

      - name: Run Playwright tests
        run: pnpm test:e2e
        env:
          VITE_E2E_TESTING: 'true'

      - name: Upload Playwright Report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 14

  # ──────────────────────────────────────────────
  # Security Gate — pnpm audit + dependency allowlist check
  # This job BLOCKS CI on HIGH/CRITICAL vulnerabilities.
  # Advisory-level findings do not block but do emit warnings.
  # ──────────────────────────────────────────────
  security:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [lint-typecheck]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Audit — block on HIGH/CRITICAL CVEs (production deps only)
        run: pnpm audit --audit-level=high --prod
        # Only audits production (non-dev) dependencies.
        # Dev-tool CVEs (@log4brains/cli, @lhci/cli, autoprefixer) are out of scope
        # for production security and are tracked separately in sbom-scan.yml.

      - name: Verify extended security workflows exist
        run: |
          if [ ! -f .github/workflows/security-full.yml ]; then
            echo "::error::security-full.yml not found — required for extended SAST and secret scanning"
            exit 1
          fi
          if [ ! -f .github/workflows/sbom-scan.yml ]; then
            echo "::error::sbom-scan.yml not found — required for SBOM generation"
            exit 1
          fi
          echo "✅ extended security workflows present"

  ci-passed:
    name: ✅ CI Passed
    runs-on: ubuntu-latest
    if: always()
    needs:
      - lint-typecheck
      - unit-tests
      - build
      - e2e-tests
      - security
    steps:
      - name: Evaluate full CI workflow
        run: |
          echo "Lint & Type Check: ${{ needs.lint-typecheck.result }}"
          echo "Unit Tests: ${{ needs.unit-tests.result }}"
          echo "Build: ${{ needs.build.result }}"
          echo "E2E Tests: ${{ needs.e2e-tests.result }}"
          echo "Security Gate: ${{ needs.security.result }}"
          if [[ "${{ needs.lint-typecheck.result }}" != "success" || \
                "${{ needs.unit-tests.result }}" != "success" || \
                "${{ needs.build.result }}" != "success" || \
                "${{ needs.e2e-tests.result }}" != "success" || \
                "${{ needs.security.result }}" != "success" ]]; then
            echo "::error::At least one required CI job did not pass"
            exit 1
          fi
          echo "✅ All CI jobs passed"
