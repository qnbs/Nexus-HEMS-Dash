name: Tauri Desktop Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version without leading "v" (for example 1.2.0)
        required: true
        default: '1.10.0'
  release:
    types: [published]

# Read-only default; the build-tauri job grants write scopes explicitly.
permissions: read-all

concurrency:
  group: tauri-build-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CI: true

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: linux
          - platform: macos-latest
            target: macos
          - platform: windows-latest
            target: windows

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Harden the runner (Linux only)
        if: runner.os == 'Linux'
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup-node-pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          toolchain: stable

      - name: Rust cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: apps/web/src-tauri

      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Resolve release version
        id: release-version
        shell: bash
        run: |
          RAW_VERSION="${{ github.event.release.tag_name || inputs.version }}"
          VERSION="${RAW_VERSION#v}"
          if [ -z "$VERSION" ]; then
            echo "::error::Unable to resolve release version"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved Tauri release version: ${VERSION}"

      # Default CI path: ad-hoc sign macOS bundles ("-") so broken/missing Apple
      # secrets do not fail the matrix. Enable signed+notarized builds only when
      # repository variable MACOS_CODESIGN_ENABLED=true and Apple secrets are valid.
      - name: Configure macOS ad-hoc signing (default CI)
        if: matrix.target == 'macos' && vars.MACOS_CODESIGN_ENABLED != 'true'
        run: |
          jq '.bundle.macOS.signingIdentity = "-"' apps/web/src-tauri/tauri.conf.json > /tmp/tauri.conf.json
          mv /tmp/tauri.conf.json apps/web/src-tauri/tauri.conf.json
          echo "::notice::macOS ad-hoc signing (unsigned .app/.dmg). Set repository variable MACOS_CODESIGN_ENABLED=true with valid Apple secrets for notarized releases."

      - name: Build Tauri app (Linux / Windows / macOS ad-hoc)
        if: matrix.target != 'macos' || vars.MACOS_CODESIGN_ENABLED != 'true'
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/web/src-tauri
          tagName: v${{ steps.release-version.outputs.version }}
          releaseName: 'Nexus HEMS Dashboard v${{ steps.release-version.outputs.version }}'
          releaseBody: 'Desktop builds for Nexus HEMS Dashboard v${{ steps.release-version.outputs.version }}.'
          releaseDraft: true
          prerelease: false
          retryAttempts: 3

      - name: Build Tauri app (macOS signed + notarized)
        if: matrix.target == 'macos' && vars.MACOS_CODESIGN_ENABLED == 'true'
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: apps/web/src-tauri
          tagName: v${{ steps.release-version.outputs.version }}
          releaseName: 'Nexus HEMS Dashboard v${{ steps.release-version.outputs.version }}'
          releaseBody: 'Desktop builds for Nexus HEMS Dashboard v${{ steps.release-version.outputs.version }}.'
          releaseDraft: true
          prerelease: false
          retryAttempts: 3
