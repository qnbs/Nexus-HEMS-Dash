name: Stale Issues & PRs

on:
  schedule:
    # Every day at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  stale:
    name: Mark & Close Stale
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@eb5cf3af3ac0a1aa4c9c45633dd1ae542a27a899 # v10.3.0
        with:
          # ── Issues ──────────────────────────────────
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: stale
          stale-issue-message: >
            🕒 This issue has been automatically marked as **stale** because
            it has not had any activity for 60 days. It will be closed in
            14 days if no further activity occurs.
            If this issue is still relevant, please leave a comment or
            remove the `stale` label.
          close-issue-message: >
            🔒 This issue has been automatically closed due to inactivity.
            Feel free to reopen it if the problem persists.

          # ── Pull Requests ──────────────────────────
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-pr-label: stale
          stale-pr-message: >
            🕒 This pull request has been automatically marked as **stale**
            because it has not had any activity for 30 days. It will be
            closed in 14 days if no further activity occurs.
            Please update or rebase if this PR is still needed.
          close-pr-message: >
            🔒 This PR has been automatically closed due to inactivity.
            Feel free to reopen and update it when ready.

          # ── Exempt labels ──────────────────────────
          exempt-issue-labels: pinned,security,bug,in-progress
          exempt-pr-labels: pinned,security,in-progress

          # ── Limits ─────────────────────────────────
          operations-per-run: 100
