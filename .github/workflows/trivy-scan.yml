name: Trivy Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily at 04:00 UTC
    - cron: '0 4 * * *'

permissions: read-all

jobs:
  # ──────────────────────────────────────────────
  # Filesystem scan (npm deps + secrets + misconfig)
  # ──────────────────────────────────────────────
  trivy-fs:
    name: Filesystem Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'vuln,secret,misconfig'
          severity: 'HIGH,CRITICAL'
          format: 'sarif'
          output: 'trivy-fs.sarif'
          trivy-config: trivy.yaml

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@603b797f8b14b413fe025cd935a91c16c4782713 # v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
        continue-on-error: true

      - name: Trivy table output
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        if: always()
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: 'vuln'
          severity: 'HIGH,CRITICAL'
          format: 'table'
          trivy-config: trivy.yaml

  # ──────────────────────────────────────────────
  # Docker image scan (on push to main only)
  # ──────────────────────────────────────────────
  trivy-image:
    name: Docker Image Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build Docker image
        run: docker build -t nexus-hems-dash:scan .

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: 'nexus-hems-dash:scan'
          scanners: 'vuln'
          severity: 'HIGH,CRITICAL'
          format: 'sarif'
          output: 'trivy-image.sarif'

      - name: Upload image SARIF
        uses: github/codeql-action/upload-sarif@603b797f8b14b413fe025cd935a91c16c4782713 # v3
        if: always()
        with:
          sarif_file: trivy-image.sarif
        continue-on-error: true

      - name: Trivy image table
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        if: always()
        with:
          image-ref: 'nexus-hems-dash:scan'
          scanners: 'vuln'
          severity: 'HIGH,CRITICAL'
          format: 'table'
