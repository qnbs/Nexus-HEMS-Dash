# ──────────────────────────────────────────────
# PR Labeler Configuration (actions/labeler v5)
# Maps file globs to labels applied on PRs
# ──────────────────────────────────────────────

# ── Area labels ──────────────────────────────

'area: components':
  - changed-files:
      - any-glob-to-any-file:
          - src/components/**

'area: pages':
  - changed-files:
      - any-glob-to-any-file:
          - src/pages/**

'area: adapters':
  - changed-files:
      - any-glob-to-any-file:
          - src/core/adapters/**
          - src/core/useEnergyStore.ts
          - src/core/adapter-*.ts

'area: design-system':
  - changed-files:
      - any-glob-to-any-file:
          - src/index.css
          - src/design-tokens.ts
          - DESIGN-SYSTEM.md

'area: i18n':
  - changed-files:
      - any-glob-to-any-file:
          - src/locales/**
          - src/i18n.ts

'area: ai':
  - changed-files:
      - any-glob-to-any-file:
          - src/core/aiClient.ts
          - src/lib/predictive-ai.ts
          - src/lib/optimizer.ts
          - src/lib/ml-forecast.ts
          - src/lib/ai-keys.ts
          - src/pages/AISettingsPage.tsx
          - src/pages/OptimizationAI.tsx
          - src/components/AIOptimizerPanel.tsx
          - src/components/EnhancedAIOptimizer.tsx

'area: pwa':
  - changed-files:
      - any-glob-to-any-file:
          - src/lib/offline-cache.ts
          - src/lib/background-sync.ts
          - src/lib/pwa-install.ts
          - src/components/OfflineBanner.tsx
          - src/components/PWA*.tsx
          - public/manifest.json

'area: security':
  - changed-files:
      - any-glob-to-any-file:
          - src/lib/auth/**
          - src/lib/crypto.ts
          - src/lib/secure-store.ts
          - src/core/command-safety.ts
          - SECURITY.md
          - .gitleaks.toml
          - trivy.yaml
          - trivy-secret.yaml

# ── Type labels ──────────────────────────────

'type: ci':
  - changed-files:
      - any-glob-to-any-file:
          - .github/workflows/**
          - .github/dependabot.yml
          - .github/labeler.yml

'type: docs':
  - changed-files:
      - any-glob-to-any-file:
          - '*.md'
          - docs/**
          - LICENSE

'type: tests':
  - changed-files:
      - any-glob-to-any-file:
          - src/tests/**
          - tests/**
          - vitest.config.ts
          - playwright.config.ts

'type: config':
  - changed-files:
      - any-glob-to-any-file:
          - vite.config.ts
          - tsconfig.json
          - eslint.config.js
          - tailwind.config.ts
          - package.json

'type: docker':
  - changed-files:
      - any-glob-to-any-file:
          - Dockerfile
          - Dockerfile.server
          - docker-compose.yml
          - nginx.conf

'type: tauri':
  - changed-files:
      - any-glob-to-any-file:
          - src-tauri/**
